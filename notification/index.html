<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Soilpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
            --primary: #2d5a27; --border: #e5e7eb; --accent: #fbbf24;
        }
        body.dark-mode {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- Header --- */
        header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 10px 15px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo-box { width: 30px; height: 30px; background: var(--primary); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        
        .nav-actions { display: flex; gap: 10px; }
        .nav-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- Notification List --- */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        #notifList { display: flex; flex-direction: column; gap: 12px; }
        .notif-card { 
            background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 16px; 
            display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;
            cursor: pointer; transform: translateY(0); transition: 0.2s;
        }
        .notif-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .notif-icon { width: 45px; height: 45px; background: rgba(45, 90, 39, 0.1); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .notif-content { flex: 1; }
        .notif-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; }
        .notif-date { font-size: 0.85rem; color: var(--muted); }
        .notif-arrow { color: var(--muted); font-size: 0.9rem; }

        /* --- States --- */
        #loading { text-align: center; padding: 50px; }
        .shimmer { height: 80px; background: var(--card); border-radius: 16px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <a href="index.html" class="logo"><div class="logo-box">S</div> Soilpad</a>
        <div class="nav-actions">
            <button class="nav-btn"><i class="fas fa-bookmark"></i></button>
            <button class="nav-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </nav>
</header>

<div class="container">
    <div class="section-title">
        <i class="fas fa-bell" style="color: var(--accent);"></i>
        Latest Notifications
    </div>

    <div id="notifList">
        <div class="shimmer"></div>
        <div class="shimmer" style="margin-top:10px"></div>
        <div class="shimmer" style="margin-top:10px"></div>
    </div>
</div>

<footer>© 2026 Soilpad. Stay Updated.</footer>

<script>
    // GitHub API Settings
    const REPO_OWNER = "soilpad";
    const REPO_NAME = "contact";
    const FOLDER_PATH = "notification";
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`;

    async function fetchNotifications() {
        const listElement = document.getElementById('notifList');

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("Failed to fetch");
            
            let files = await response.json();

            // 1. Filter: Accept only .html files and exclude index.html
            files = files.filter(file => 
                file.name.toLowerCase().endsWith('.html') && 
                file.name.toLowerCase() !== 'index.html'
            );

            // 2. Sort: Latest on top (GitHub API returns alphabetical, so we reverse or use logic)
            // Note: If you name files like "01-info.html", "02-info.html", use reverse()
            files.reverse(); 

            listElement.innerHTML = ""; // Clear shimmers

            if (files.length === 0) {
                listElement.innerHTML = "<p style='text-align:center; color:var(--muted);'>No notifications found.</p>";
                return;
            }

            files.forEach(file => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/-/g, " ");
                const card = document.createElement('a');
                card.className = 'notif-card';
                // Redirects to your htmlv.html page using the ?n= parameter
                card.href = `notification.html?n=${file.name.replace('.html', '')}`;

                card.innerHTML = `
                    <div class="notif-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="notif-content">
                        <div class="notif-title">${cleanName}</div>
                        <div class="notif-date">Tap to view update</div>
                    </div>
                    <div class="notif-arrow"><i class="fas fa-chevron-right"></i></div>
                `;
                listElement.appendChild(card);
            });

        } catch (error) {
            listElement.innerHTML = "<p style='text-align:center; color:#ef4444;'>Unable to load notifications. Please try again later.</p>";
        }
    }

    // Theme Switcher
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        themeBtn.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    };

    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
    }

    // Run on load
    fetchNotifications();
</script>
</body>
</html>
