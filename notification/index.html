<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center | Soilpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
            --primary: #2d5a27; --border: #e5e7eb; --accent: #fbbf24;
        }
        body.dark-mode {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); padding-top: 30px; }

        .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }

        /* --- Search Bar --- */
        .search-wrapper { position: sticky; top: 20px; z-index: 100; margin-bottom: 30px; }
        .search-box {
            width: 100%; padding: 16px 20px 16px 50px;
            background: var(--card); border: 2px solid var(--border);
            border-radius: 18px; font-size: 1rem; color: var(--text);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); outline: none;
        }
        .search-box:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* --- Notification Items --- */
        .notif-label { font-size: 0.9rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        #notifList { display: flex; flex-direction: column; gap: 12px; }
        .notif-card { 
            background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 16px; 
            display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;
            transition: 0.2s ease;
        }
        .notif-card:hover { border-color: var(--primary); background: var(--bg); transform: scale(1.01); }
        
        .notif-icon { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .notif-content { flex: 1; }
        .notif-title { font-weight: 700; font-size: 1rem; margin-bottom: 2px; text-transform: capitalize; }
        .notif-tag { font-size: 0.75rem; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 800; }

        /* --- States --- */
        .loading-state { text-align: center; color: var(--muted); margin-top: 50px; }
        .no-results { text-align: center; padding: 40px; color: var(--muted); }
        
        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-box" placeholder="Search notifications...">
    </div>

    <span class="notif-label">Recent Updates</span>
    
    <div id="notifList">
        <div class="loading-state"><i class="fas fa-circle-notch fa-spin"></i> Fetching notifications...</div>
    </div>
</div>

<footer>© 2026 Soilpad. Quick Access Portal.</footer>

<script>
    const REPO_OWNER = "soilpad";
    const REPO_NAME = "contact";
    const FOLDER_PATH = "notification";
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`;
    
    let allNotifications = [];

    async function getNotifications() {
        try {
            const response = await fetch(API_URL);
            let files = await response.json();

            // Filter out index.html and non-html files
            allNotifications = files.filter(f => 
                f.name.toLowerCase().endsWith('.html') && 
                f.name.toLowerCase() !== 'index.html'
            ).reverse(); // Latest files first

            renderList(allNotifications);
        } catch (error) {
            document.getElementById('notifList').innerHTML = `<div class="no-results">Failed to load.</div>`;
        }
    }

    function renderList(list) {
        const container = document.getElementById('notifList');
        if (list.length === 0) {
            container.innerHTML = `<div class="no-results">No notifications found matching your search.</div>`;
            return;
        }

        container.innerHTML = list.map(file => {
            const cleanName = file.name.replace('.html', '').replace(/-/g, ' ');
            const viewerURL = `notification.html?n=${file.name.replace('.html', '')}`;
            
            return `
                <a href="${viewerURL}" target="_blank" class="notif-card">
                    <div class="notif-icon"><i class="fas fa-bell"></i></div>
                    <div class="notif-content">
                        <div class="notif-title">${cleanName}</div>
                        <span class="notif-tag">NEW</span>
                    </div>
                    <i class="fas fa-external-link-alt" style="color:var(--muted); font-size:0.8rem"></i>
                </a>
            `;
        }).join('');
    }

    // Search Logic
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allNotifications.filter(n => 
            n.name.toLowerCase().includes(term)
        );
        renderList(filtered);
    });

    // Run on start
    getNotifications();

    // Preserve dark mode from localStorage if it exists
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>
