<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Soilpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
            --primary: #2d5a27; --border: #e5e7eb; --accent: #fbbf24;
        }
        body.dark-mode {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px 0; }

        .container { max-width: 650px; margin: 0 auto; padding: 0 15px; }

        /* Search Section */
        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; }
        .search-bar {
            width: 100%; padding: 15px 20px 15px 50px;
            background: var(--card); border: 2px solid var(--border);
            border-radius: 15px; font-size: 1rem; color: var(--text); outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .search-bar:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* Notification List */
        .list-label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        #notifList { display: flex; flex-direction: column; gap: 10px; }
        .notif-link { 
            background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 14px; 
            display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;
            transition: 0.2s;
        }
        .notif-link:hover { border-color: var(--primary); transform: translateX(5px); background: var(--bg); }
        
        .notif-icon { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .notif-info { flex: 1; }
        .notif-name { font-weight: 700; font-size: 1rem; text-transform: capitalize; }
        .status-tag { font-size: 0.65rem; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 5px; }

        .loading { text-align: center; margin-top: 50px; color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchBox" class="search-bar" placeholder="Search notifications...">
    </div>

    <span class="list-label">Latest Updates</span>
    <div id="notifList">
        <div class="loading"><i class="fas fa-sync fa-spin"></i> Loading latest notifications...</div>
    </div>
</div>

<script>
    const API_URL = "https://api.github.com/repos/soilpad/contact/contents/notification";
    let cachedFiles = [];

    async function fetchNotifications() {
        try {
            const response = await fetch(API_URL);
            const files = await response.json();

            // 1. Filter: .html files only and skip index.html
            // 2. Sort: We use the GitHub API default order and reverse it 
            //    (Assuming you name files with numbers or dates, or want the most recent push at the top)
            cachedFiles = files.filter(f => 
                f.name.toLowerCase().endsWith('.html') && 
                f.name.toLowerCase() !== 'index.html'
            ).reverse(); 

            renderItems(cachedFiles);
        } catch (err) {
            document.getElementById('notifList').innerHTML = "Error connecting to server.";
        }
    }

    function renderItems(list) {
        const container = document.getElementById('notifList');
        if (list.length === 0) {
            container.innerHTML = "<p class='loading'>No results found.</p>";
            return;
        }

        container.innerHTML = list.map((file, index) => {
            const fileNameClean = file.name.replace('.html', '');
            const isNew = index === 0 ? '<span class="status-tag">LATEST</span>' : '';
            
            // Redirect to your viewer page with the filename in the URL
            const redirectUrl = `notification.html?n=${fileNameClean}`;

            return `
                <a href="${redirectUrl}" class="notif-link">
                    <div class="notif-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="notif-info">
                        <div class="notif-name">${fileNameClean.replace(/-/g, ' ')} ${isNew}</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color:var(--muted); font-size:0.8rem"></i>
                </a>
            `;
        }).join('');
    }

    // Search Filtering
    document.getElementById('searchBox').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = cachedFiles.filter(f => f.name.toLowerCase().includes(term));
        renderItems(filtered);
    });

    // Theme persistence
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    fetchNotifications();
</script>
</body>
</html>
