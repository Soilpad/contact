<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center | Soilpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
            --primary: #2d5a27; --border: #e5e7eb; --accent: #fbbf24;
        }
        body.dark-mode {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px 0; }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        /* --- Search Bar --- */
        .search-wrapper { margin-bottom: 20px; position: relative; }
        .search-box {
            width: 100%; padding: 15px 20px 15px 45px;
            background: var(--card); border: 2px solid var(--border);
            border-radius: 15px; font-size: 1rem; color: var(--text); outline: none;
        }
        .search-box:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* --- Preview Window --- */
        #previewContainer {
            display: none; background: var(--card); border: 2px solid var(--primary);
            border-radius: 18px; margin-bottom: 30px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .preview-header { padding: 10px 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        #previewFrame { width: 100%; height: 500px; border: none; background: white; }

        /* --- List View --- */
        .notif-label { font-size: 0.8rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: block; }
        #notifList { display: flex; flex-direction: column; gap: 10px; }
        .notif-card { 
            background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .notif-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .notif-card.active { border-left: 5px solid var(--accent); background: var(--bg); }
        
        .notif-icon { width: 35px; height: 35px; background: var(--primary); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .notif-content { flex: 1; }
        .notif-title { font-weight: 700; font-size: 0.95rem; text-transform: capitalize; }
        
        .loading-text { text-align: center; padding: 20px; color: var(--muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-box" placeholder="Search notification name...">
    </div>

    <div id="previewContainer">
        <div class="preview-header">
            <span id="previewTitle">Preview</span>
            <i class="fas fa-times" style="cursor:pointer" onclick="closePreview()"></i>
        </div>
        <iframe id="previewFrame"></iframe>
    </div>

    <span class="notif-label">Files in /notification</span>
    <div id="notifList">
        <div class="loading-text">Scanning folder...</div>
    </div>
</div>

<script>
    const REPO_URL = "https://api.github.com/repos/soilpad/contact/contents/notification";
    const RAW_BASE = "https://raw.githubusercontent.com/soilpad/contact/main/notification/";
    
    let notifications = [];

    async function loadNotifications() {
        try {
            const res = await fetch(REPO_URL);
            const data = await res.json();
            
            // Filter and Sort
            notifications = data.filter(f => 
                f.name.endsWith('.html') && f.name !== 'index.html'
            ).reverse();

            renderList(notifications);

            // Check if URL already has a file requested
            const urlFile = new URLSearchParams(window.location.search).get('n');
            if(urlFile) openPreview(urlFile);

        } catch (e) {
            document.getElementById('notifList').innerHTML = "Error loading files.";
        }
    }

    function renderList(list) {
        const container = document.getElementById('notifList');
        container.innerHTML = list.length ? list.map(f => {
            const nameOnly = f.name.replace('.html', '');
            return `
                <div class="notif-card" onclick="openPreview('${nameOnly}')">
                    <div class="notif-icon"><i class="fas fa-file-code"></i></div>
                    <div class="notif-content">
                        <div class="notif-title">${nameOnly.replace(/-/g, ' ')}</div>
                    </div>
                    <i class="fas fa-eye" style="color:var(--muted)"></i>
                </div>
            `;
        }).join('') : "No results found.";
    }

    function openPreview(fileName) {
        const fullFileName = fileName.endsWith('.html') ? fileName : fileName + ".html";
        const frame = document.getElementById('previewFrame');
        const container = document.getElementById('previewContainer');
        const title = document.getElementById('previewTitle');

        // Update UI
        title.innerText = "Viewing: " + fileName.replace(/-/g, ' ');
        container.style.display = 'block';
        frame.src = RAW_BASE + fullFileName;

        // Update URL without refreshing
        window.history.pushState({}, '', `?n=${fileName}`);
        
        // Scroll to preview
        container.scrollIntoView({ behavior: 'smooth' });
    }

    function closePreview() {
        document.getElementById('previewContainer').style.display = 'none';
        window.history.pushState({}, '', window.location.pathname);
    }

    // Search Logic
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = notifications.filter(n => n.name.toLowerCase().includes(term));
        renderList(filtered);
    });

    // Dark Mode Support
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    loadNotifications();
</script>
</body>
</html>
